<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Momentum</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0b0b12; overflow: hidden; font-family: sans-serif; user-select: none; }
canvas { display: block; position: absolute; top: 0; left: 0; }

#overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  pointer-events: none;
}

/* ---- MINIMALIST MENU SYSTEM ---- */
.menu-step {
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 30px; opacity: 0; transform: scale(0.95); transition: all 0.3s ease;
}
.menu-step.active {
  display: flex; opacity: 1; transform: scale(1);
}

/* Big Dice Display */
.dice {
  display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
  width: 120px; height: 120px; padding: 15px; 
  background: rgba(255,255,255,0.03); border-radius: 20px; 
  border: 3px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
  transition: all 0.15s ease;
}
.dice.pulse { border-color: white; box-shadow: 0 0 40px rgba(255,255,255,0.1); transform: scale(1.05); }

.dot { width: 22px; height: 22px; border-radius: 50%; margin: auto; display: none; box-shadow: inset -3px -3px 6px rgba(0,0,0,0.4); }

/* Dice Layout Logic */
.dice[data-count="1"] .dot-1 { display: block; grid-area: 2 / 2; }

.dice[data-count="2"] .dot-1 { display: block; grid-area: 1 / 1; }
.dice[data-count="2"] .dot-2 { display: block; grid-area: 3 / 3; }

.dice[data-count="3"] .dot-1 { display: block; grid-area: 1 / 1; }
.dice[data-count="3"] .dot-2 { display: block; grid-area: 2 / 2; }
.dice[data-count="3"] .dot-3 { display: block; grid-area: 3 / 3; }

.dice[data-count="4"] .dot-1 { display: block; grid-area: 1 / 1; }
.dice[data-count="4"] .dot-2 { display: block; grid-area: 1 / 3; }
.dice[data-count="4"] .dot-3 { display: block; grid-area: 3 / 1; }
.dice[data-count="4"] .dot-4 { display: block; grid-area: 3 / 3; }

/* Background Icon Display */
.bg-icon-box {
  width: 160px; height: 100px; padding: 10px;
  background: rgba(255,255,255,0.03); border-radius: 20px;
  border: 3px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center;
  transition: all 0.15s ease;
}
.bg-icon-box.pulse { border-color: white; transform: scale(1.05); }
.bg-svg { width: 100%; height: 100%; overflow: visible; display: none; }
.bg-icon-box[data-choice="1"] #svg-bg-1 { display: block; }
.bg-icon-box[data-choice="2"] #svg-bg-2 { display: block; }
.bg-icon-box[data-choice="3"] #svg-bg-3 { display: block; }

.nav-hint { font-size: 14px; font-weight: bold; letter-spacing: 2px; color: rgba(255,255,255,0.2); position: absolute; bottom: 40px; }

/* ---- WIN/DEATH SCREENS ---- */
#win-screen { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 24px; pointer-events: all; color: white; text-align: center; }
#win-screen h2 { font-size: 48px; font-weight: 900; }
#win-screen p { color: rgba(255,255,255,0.5); font-size: 16px; margin-top: -15px; margin-bottom: 20px;}

/* ---- SURVIVAL SCORE ---- */
#survival-score-display {
  position: absolute; top: 30px; width: 100%; text-align: center;
  font-size: 48px; font-weight: 900; color: rgba(255,255,255,0.1);
  display: none; pointer-events: none; letter-spacing: -2px;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="overlay">
  <div id="step-players" class="menu-step active">
    <div id="dice-ui" class="dice" data-count="1">
      <div class="dot dot-1" style="background:#0066ff"></div>
      <div class="dot dot-2" style="background:#ff3366"></div>
      <div class="dot dot-3" style="background:#ffcc00"></div>
      <div class="dot dot-4" style="background:#bb88ff"></div>
    </div>
  </div>

  <div id="step-bg" class="menu-step">
    <div id="bg-ui" class="bg-icon-box" data-choice="1">
      <svg id="svg-bg-1" class="bg-svg" viewBox="0 0 100 50">
        <path d="M 5 5 Q 50 80 95 5" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
      </svg>
      <svg id="svg-bg-2" class="bg-svg" viewBox="0 0 100 50">
        <path d="M 5 5 Q 27.5 70 50 35 Q 72.5 70 95 5" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
      </svg>
      <svg id="svg-bg-3" class="bg-svg" viewBox="0 0 100 50">
        <path d="M 5 5 Q 20 60 35 30 Q 50 60 65 30 Q 80 60 95 5" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <p id="menu-hint" class="nav-hint">[W] TOGGLE &nbsp;&nbsp; [S] SELECT</p>

  <div id="win-screen" class="menu-step">
    <h2 id="win-msg"></h2>
    <p id="win-submsg"></p>
    <p class="nav-hint" style="position:static; margin-top: 20px;">[S] REPLAY &nbsp;&nbsp; [W] MENU</p>
  </div>
</div>

<div id="survival-score-display">0</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- CONSTANTS & SETTINGS ---
const GRAV         = 0.15;
const GRAV_DIVE    = 0.7;
const FRICTION     = 0.992;
const BONK_THRESHOLD = 18;
const BONK_COOLDOWN  = 45;
const MAX_LIVES      = 5;

const PLAYER_DEFS = [
  { color: '#0066ff', keys: { dive: 's', jump: 'w' } },
  { color: '#ff3366', keys: { dive: 'arrowdown', jump: 'arrowup' } },
  { color: '#ffcc00', keys: { dive: 'l', jump: 'o' } },
  { color: '#bb88ff', keys: { dive: 'numpad2', jump: 'numpad8' } },
];

let players    = [];
let enemies    = [];
let particles  = []; 
let waves      = []; 
let bonkTimer  = 0;

// STATE: 'title_players' | 'title_bg' | 'playing' | 'win'
let gameState  = 'title_players'; 
let numPlayers = 1;
let bgChoice   = 1;
let isSurvival = false;
let survivalScore = 0;
let spawnTimer = 0;

// --- AUDIO ENGINE ---
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone({ type = 'square', freq = 440, freq2 = null, duration = 0.12, volume = 0.18, attack = 0.005 }) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (freq2 !== null) osc.frequency.linearRampToValueAtTime(freq2, ac.currentTime + duration);
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(volume, ac.currentTime + attack);
    gain.gain.linearRampToValueAtTime(0, ac.currentTime + duration);
    osc.start(ac.currentTime); osc.stop(ac.currentTime + duration + 0.01);
  } catch(e) {}
}

function sfxJump() { playTone({ type: 'square', freq: 220, freq2: 440, duration: 0.12, volume: 0.15 }); }
function sfxDive() { playTone({ type: 'sawtooth', freq: 200, freq2: 800, duration: 0.45, volume: 0.14, attack: 0.01 }); }
function sfxBonk() { playTone({ type: 'square', freq: 600, freq2: 200, duration: 0.14, volume: 0.22 }); setTimeout(() => playTone({ type: 'square', freq: 150, freq2: 80, duration: 0.18, volume: 0.20 }), 60); }
function sfxBump() { playTone({ type: 'square', freq: 160, freq2: 120, duration: 0.08, volume: 0.14 }); }
function sfxWin() { const notes = [523, 659, 784, 1047]; notes.forEach((f, i) => setTimeout(() => playTone({ type: 'square', freq: f, duration: 0.15, volume: 0.20 }), i * 110)); }
function sfxLand() { playTone({ type: 'triangle', freq: 90, freq2: 60, duration: 0.06, volume: 0.10 }); }
function sfxMenuMove() { playTone({ type: 'square', freq: 330, freq2: 380, duration: 0.05, volume: 0.08 }); }
function sfxMenuSelect() { playTone({ type: 'square', freq: 440, freq2: 660, duration: 0.10, volume: 0.12 }); }
function sfxDeath() {
  const notes = [350, 300, 250, 200, 150];
  notes.forEach((f, i) => setTimeout(() => playTone({ type: 'sawtooth', freq: f, duration: 0.1, volume: 0.2 }), i * 80));
  setTimeout(() => playTone({ type: 'square', freq: 80, duration: 0.5, volume: 0.3 }), 400);
}

// --- UI / MENU LOGIC ---
function animateUI(elementId) {
  const el = document.getElementById(elementId);
  el.classList.remove('pulse');
  void el.offsetWidth; // trigger reflow
  el.classList.add('pulse');
}

function switchMenuState(newState) {
  document.querySelectorAll('.menu-step').forEach(el => el.classList.remove('active'));
  document.getElementById('menu-hint').style.display = (newState === 'playing') ? 'none' : 'block';
  
  if (newState === 'title_players') document.getElementById('step-players').classList.add('active');
  if (newState === 'title_bg') document.getElementById('step-bg').classList.add('active');
  if (newState === 'win') document.getElementById('win-screen').classList.add('active');
  
  gameState = newState;
}

function startGame() {
  getAudio().resume();
  switchMenuState('playing');
  isSurvival = (numPlayers === 1);
  survivalScore = 0;
  spawnTimer = 0;
  
  const scoreEl = document.getElementById('survival-score-display');
  scoreEl.style.display = isSurvival ? 'block' : 'none';
  scoreEl.textContent = '0';
  
  spawnPlayers(numPlayers);
}

function winRematch() {
  sfxMenuSelect();
  startGame();
}

function goToTitle() {
  sfxMenuMove();
  document.getElementById('survival-score-display').style.display = 'none';
  switchMenuState('title_players');
}

// --- TERRAIN MATH ---
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function terrainY(x) {
  const u = x / canvas.width;
  
  // MACRO BOWL: Math.pow ensures sharp, steep walls on the far left and right edges.
  // 1 at edges, 0 in the dead center.
  const macro = Math.pow(Math.abs(2 * u - 1), 6); 
  const baseCenter = canvas.height * 0.75; 
  const edgeLift = canvas.height * 0.6; 

  // MICRO VALLEYS: Internal bumps based on background choice.
  let bumps = 0;
  const bumpAmp = canvas.height * 0.18;
  
  if (bgChoice === 1) {
    // 1 smooth valley in the center
    bumps = -bumpAmp * 1.2 * Math.cos(u * Math.PI * 2);
  } else if (bgChoice === 2) {
    // 2 valleys (W shape)
    bumps = -bumpAmp * Math.cos(u * Math.PI * 4);
  } else if (bgChoice === 3) {
    // 3 valleys 
    bumps = -bumpAmp * 0.7 * Math.cos(u * Math.PI * 6);
  }

  return baseCenter - (macro * edgeLift) + bumps;
}

// Use numerical derivative for friction logic along the complex curve
function terrainSlope(x) {
  const dx = 1;
  return (terrainY(x + dx) - terrainY(x - dx)) / (2 * dx);
}

// --- VISUAL FX ---
function createExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    const size = 6 + Math.random() * 10;
    const decay = 0.01 + Math.random() * 0.02;
    particles.push({ x, y, color, size, velX: Math.cos(angle) * speed, velY: Math.sin(angle) * speed, alpha: 1, decay });
  }
}

// --- PLAYER & ENEMY SPAWNING ---
function spawnPlayers(n) {
  players = [];
  enemies = [];
  particles = [];
  waves = [];
  
  for (let i = 0; i < n; i++) {
    const def = PLAYER_DEFS[i];
    const x = canvas.width * (i + 1) / (n + 1);
    players.push({
      id: i, isAI: false, x, y: 80,
      vx: (i % 2 === 0 ? 1 : -1) * (3 + i * 0.5), vy: 0,
      r: 45, color: def.color,
      diving: false, onGround: false, jumped: false,
      hitFlash: 0, lives: MAX_LIVES
    });
  }
  bonkTimer = 0; 
  if (isSurvival) spawnEnemy(); 
}

function spawnEnemy() {
  const colors = ['#00ffcc', '#ff5500', '#aa00ff', '#ffffff'];
  enemies.push({
    id: 'e' + Math.random(), isAI: true,
    x: Math.random() > 0.5 ? canvas.width - 50 : 50, y: 50,
    vx: (Math.random() - 0.5) * 6, vy: 0,
    r: 40, color: colors[Math.floor(Math.random() * colors.length)],
    diving: false, onGround: false, jumped: false, hitFlash: 0, lives: 1
  });
}

// --- COLLISIONS ---
function sweptCircleCollide(a, b) {
  const minDist = a.r + b.r;
  const rx = b.x - a.x, ry = b.y - a.y;
  const dvx = b.vx - a.vx, dvy = b.vy - a.vy;
  if (Math.sqrt(rx*rx + ry*ry) < minDist) return 0;
  const A = dvx*dvx + dvy*dvy;
  if (A < 1e-10) return null; 
  const B = 2 * (rx*dvx + ry*dvy);
  const C = rx*rx + ry*ry - minDist*minDist;
  const disc = B*B - 4*A*C;
  if (disc < 0) return null;
  const t = (-B - Math.sqrt(disc)) / (2*A);
  return (t >= 0 && t <= 1) ? t : null;
}

function killEntity(entity, isPlayerArray) {
  sfxDeath();
  createExplosion(entity.x, entity.y, entity.color, 40); 
  
  for(let w=0; w<4; w++) {
    setTimeout(() => { waves.push({ x: entity.x, y: entity.y, r: entity.r, alpha: 1.0, width: 6 }); }, w * 150);
  }
  
  if (isPlayerArray) {
    players = players.filter(p => p.id !== entity.id);
  } else {
    enemies = enemies.filter(e => e.id !== entity.id);
    survivalScore++; // Increment score by 1 point per kill
    document.getElementById('survival-score-display').textContent = survivalScore;
  }
}

function resolveCollision(a, b) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const dist = Math.sqrt(dx*dx + dy*dy) || 0.001;
  const vertDiff = a.y - b.y;

  if (Math.abs(vertDiff) > BONK_THRESHOLD) {
    const attacker = vertDiff > 0 ? b : a;
    const victim   = vertDiff > 0 ? a : b;
    
    victim.lives--;
    victim.vy = -12; 
    victim.vx += victim.x < attacker.x ? -6 : 6; 
    attacker.vy = Math.min(attacker.vy * 0.4, 0);
    victim.hitFlash = 40; 
    
    createExplosion(victim.x, victim.y, victim.color, 15); 
    waves.push({ x: victim.x, y: victim.y, r: victim.r, alpha: 1.0, width: 2.5 }); 
    sfxBonk();
    
    if (victim.lives <= 0) {
      const isVictimPlayer = players.includes(victim);
      killEntity(victim, isVictimPlayer);
    }
    bonkTimer = BONK_COOLDOWN;
    checkWinCondition();
  } else {
    const nx = dx / dist, ny = dy / dist;
    const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
    const dot = dvx*nx + dvy*ny;
    if (dot > 0) {
      const imp = dot * 0.9;
      a.vx -= imp*nx; a.vy -= imp*ny;
      b.vx += imp*nx; b.vy += imp*ny;
    }
    const overlap = (a.r + b.r - dist) / 2 + 0.5;
    a.x -= nx*overlap; a.y -= ny*overlap;
    b.x += nx*overlap; b.y += ny*overlap;
    bonkTimer = 8;
    sfxBump();
  }
}

function checkCollisions() {
  if (bonkTimer > 0) return;
  const allEntities = players.concat(enemies);
  for (let i = 0; i < allEntities.length; i++) {
    for (let j = i + 1; j < allEntities.length; j++) {
      const a = allEntities[i], b = allEntities[j];
      const t = sweptCircleCollide(a, b);
      if (t === null) continue;
      if (t > 0) {
        a.x += a.vx * t; a.y += a.vy * t;
        b.x += b.vx * t; b.y += b.vy * t;
      }
      resolveCollision(a, b);
    }
  }
}

function checkWinCondition() {
  if (isSurvival) {
    if (players.length === 0) triggerGameOver("GAME OVER", `SURVIVED: ${survivalScore}`);
  } else {
    if (players.length === 1) triggerGameOver(`PLAYER WINS`, "LAST ONE STANDING", players[0].color);
    else if (players.length === 0) triggerGameOver("DRAW", "", "white");
  }
}

function triggerGameOver(mainMsg, subMsg, color="white") {
  gameState = 'win';
  sfxWin();
  const msg = document.getElementById('win-msg');
  msg.textContent = mainMsg;
  msg.style.color = color;
  document.getElementById('win-submsg').textContent = subMsg;
  switchMenuState('win');
}

// --- GAME LOOP ---
function update() {
  // Always update visual particles/waves
  particles.forEach(p => { p.x += p.velX; p.y += p.velY; p.alpha -= p.decay; p.size *= 0.96; });
  particles = particles.filter(p => p.alpha > 0);
  
  waves = waves.filter(w => w.alpha > 0);
  waves.forEach(w => { w.r += 6; w.alpha -= 0.035; });

  if (gameState !== 'playing') return;
  if (bonkTimer > 0) bonkTimer--;

  if (isSurvival) {
    spawnTimer++;
    // Spawn every 5 seconds (60 frames * 5 = 300). Change this value to tweak AI spawn rate.
    if (spawnTimer % 300 === 0) spawnEnemy(); 
  }

  const allEntities = players.concat(enemies);
  allEntities.forEach(p => {
    if (p.hitFlash > 0) p.hitFlash--;

    // Basic AI
    if (p.isAI && players[0]) {
      const target = players[0];
      if (target.x > p.x && p.vx < 6) p.vx += 0.15;
      if (target.x < p.x && p.vx > -6) p.vx -= 0.15;
      if (Math.random() < 0.02 && p.onGround) p.vy = -8; 
    }

    const wasGround = p.onGround;
    const grav = p.diving ? GRAV_DIVE : GRAV;
    p.vy += grav; p.x += p.vx; p.y += p.vy;

    const gy = terrainY(p.x);
    if (p.y + p.r >= gy) {
      p.y = gy - p.r;
      if (!wasGround && !p.isAI) sfxLand();
      p.onGround = true; p.jumped = false;
      const sl = terrainSlope(p.x);
      let tx = 1, ty = sl;
      const len = Math.sqrt(tx*tx + ty*ty);
      tx /= len; ty /= len;
      const dot = (p.vx*tx + p.vy*ty) + (grav*ty);
      p.vx = tx * (dot * FRICTION);
      p.vy = ty * (dot * FRICTION);
    } else {
      p.onGround = false;
    }

    if (p.x < p.r) { p.x = p.r; p.vx = Math.abs(p.vx); }
    if (p.x > canvas.width - p.r) { p.x = canvas.width - p.r; p.vx = -Math.abs(p.vx); }
  });

  checkCollisions();
}

function draw() {
  ctx.fillStyle = '#0b0b12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Terrain Fill
  ctx.beginPath();
  ctx.moveTo(0, canvas.height);
  for (let x = 0; x <= canvas.width; x += 8) ctx.lineTo(x, terrainY(x));
  ctx.lineTo(canvas.width, canvas.height);
  ctx.fillStyle = '#002a3a';
  ctx.fill();

  // Terrain Line
  ctx.beginPath();
  for (let x = 0; x <= canvas.width; x += 8) {
    if (x === 0) ctx.moveTo(x, terrainY(x));
    else ctx.lineTo(x, terrainY(x));
  }
  ctx.strokeStyle = 'rgba(0,200,180,0.2)';
  ctx.lineWidth = 20.5;
  ctx.stroke();

  if (gameState !== 'playing' && gameState !== 'win') return;

  // Draw Waves
  waves.forEach(w => {
    ctx.beginPath(); ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, w.alpha)})`;
    ctx.lineWidth = w.width; ctx.stroke();
  });

  // Draw Entities
  players.concat(enemies).forEach(p => {
    let drawColor = p.color;
    
    // Hit flash overrides
    if (p.hitFlash > 0) {
      if (p.hitFlash > 30) drawColor = '#ffffff';
      else if (p.hitFlash > 20) drawColor = '#ff0000';
      else if (p.hitFlash > 10) drawColor = '#ffffff';
      else drawColor = '#ffff00';
    } else if (p.diving) {
      const r = parseInt(p.color.slice(1,3),16), g = parseInt(p.color.slice(3,5),16), b = parseInt(p.color.slice(5,7),16);
      drawColor = `rgb(${Math.round(r+(255-r)*0.35)},${Math.round(g+(255-g)*0.35)},${Math.round(b+(255-b)*0.35)})`;
    }

    // Main Circle
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = drawColor; ctx.fill();

    // Inner Specular Shine
    ctx.beginPath(); ctx.arc(p.x - p.r * 0.3, p.y - p.r * 0.3, p.r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
    
    // MINIMALIST HEALTH INDICATOR: Segmented Inner Arcs
    // Enemies only have 1 life, so don't draw segments for them. Only draw for players.
    if (!p.isAI && p.lives > 0) {
      const gap = 0.15; // Radians gap between arcs
      const arcLen = (Math.PI * 2) / MAX_LIVES - gap;
      
      ctx.lineWidth = 4;
      ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      
      for(let i = 0; i < p.lives; i++) {
         // Math to position the arcs evenly around the inside of the marble
         const startAngle = i * (arcLen + gap) - Math.PI/2;
         const endAngle = startAngle + arcLen;
         ctx.beginPath();
         // Radius is slightly smaller than the marble's radius to render inside
         ctx.arc(p.x, p.y, p.r - 8, startAngle, endAngle);
         ctx.stroke();
      }
    }
  });
  
  // Draw Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    ctx.fill(); ctx.restore();
  });
}

// --- INPUTS ---
const keys = {};
window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (keys[k]) return;
  keys[k] = true;
  if (k === 'arrowdown' || k === 'arrowup') e.preventDefault();

  // Menu: Player Selection
  if (gameState === 'title_players') {
    if (k === 'w') {
      sfxMenuMove();
      numPlayers = (numPlayers % 4) + 1;
      document.getElementById('dice-ui').setAttribute('data-count', numPlayers);
      animateUI('dice-ui');
    }
    if (k === 's') {
      sfxMenuSelect();
      switchMenuState('title_bg');
    }
    return;
  }
  
  // Menu: Background Selection
  if (gameState === 'title_bg') {
    if (k === 'w') {
      sfxMenuMove();
      bgChoice = (bgChoice % 3) + 1;
      document.getElementById('bg-ui').setAttribute('data-choice', bgChoice);
      animateUI('bg-ui');
    }
    if (k === 's') {
      sfxMenuSelect();
      startGame();
    }
    return;
  }
  
  // Menu: Win Screen
  if (gameState === 'win') {
    if (k === 's') winRematch();
    if (k === 'w') goToTitle();
    return;
  }

  // Gameplay
  if (gameState !== 'playing') return;
  players.forEach(p => {
    if(p.isAI) return;
    const def = PLAYER_DEFS[p.id];
    if (k === def.keys.dive) { p.diving = true; sfxDive(); }
    if (k === def.keys.jump && !p.jumped) { p.vy = -9; p.jumped = true; sfxJump(); }
  });
});

window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  keys[k] = false;
  players.forEach(p => {
    if(!p.isAI && k === PLAYER_DEFS[p.id].keys.dive) p.diving = false;
  });
});

function loop() { update(); draw(); requestAnimationFrame(loop); }
window.addEventListener('resize', resize);
resize();
loop();
</script>
</body>
</html>
